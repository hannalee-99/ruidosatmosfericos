<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ruídos atmosféricos</title>
    <meta name="description" content="sistemas vivos operam em desequilíbrio controlado. o vazio não é ausência, é condição de forma.">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nabla&family=Electrolize&family=VT323&family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
      :root {
        --m-x: 50%;
        --m-y: 50%;
        --font-nabla: 'Nabla', 'Impact', sans-serif;
        --font-electrolize: 'Electrolize', sans-serif;
        --font-sans: 'Helvetica Neue', 'Helvetica', 'Arial', sans-serif;
        --font-mono: 'IBM Plex Mono', monospace;
        --font-vt: 'VT323', monospace;
        
        /* Cor de destaque padrão (Dark Mode) - Matrix Green */
        --accent: #9ff85d;
        --btn-text: #000000;
      }

      @font-palette-values --matrix {
        font-family: Nabla;
        base-palette: 0;
        override-colors:
          0 #9ff85d, 1 #003B00, 2 #008F11, 3 #9ff85d, 4 #003B00, 5 #008F11;
      }

      @font-palette-values --matrix-blue {
        font-family: Nabla;
        base-palette: 0;
        /* Ajuste de legibilidade: Index 1 escurecido de #a3b0ff para #4b5ecc para contraste no fundo claro */
        override-colors:
          0 #293fcf, 1 #4b5ecc, 2 #0d1a5e, 3 #293fcf, 4 #1a2a8c, 5 #0d1a5e;
      }

      * {
        text-transform: lowercase !important; /* Força lowercase globalmente */
        cursor: none;
      }

      /* Garante que inputs e placeholders também respeitem o lowercase */
      input, textarea, button, select, option, ::placeholder {
        text-transform: lowercase !important;
      }

      @media (hover: none) {
        * { cursor: auto; }
      }

      body {
        margin: 0;
        background-color: #050505;
        font-family: var(--font-sans);
        color: #fff;
        transition: background-color 0.8s cubic-bezier(0.22, 1, 0.36, 1), color 0.8s cubic-bezier(0.22, 1, 0.36, 1);
        selection-background-color: var(--accent);
        selection-color: black;
      }

      ::selection {
        background: var(--accent);
        color: black;
      }

      body.light-mode {
        background-color: #f2f2f2;
        color: #0a0a0a;
        
        /* Cor de destaque Light Mode - Deep Blue */
        --accent: #293fcf;
        --btn-text: #ffffff;
      }
      
      body.light-mode ::selection {
        background: var(--accent);
        color: white;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background-image: 
          radial-gradient(1px 1px at 25% 35%, rgba(255, 255, 255, 0.05) 100%, transparent 0),
          radial-gradient(1px 1px at 75% 65%, rgba(255, 255, 255, 0.05) 100%, transparent 0);
        background-size: 300px 300px;
        z-index: -5;
        pointer-events: none;
      }
      
      body.light-mode::before {
         background-image: 
          radial-gradient(1px 1px at 25% 35%, rgba(0, 0, 0, 0.05) 100%, transparent 0),
          radial-gradient(1px 1px at 75% 65%, rgba(0, 0, 0, 0.05) 100%, transparent 0);
      }

      .font-nabla { font-family: var(--font-nabla); }
      .font-electrolize { font-family: var(--font-electrolize); }
      .font-terminal { font-family: var(--font-mono); }
      .font-vt { font-family: var(--font-vt); }
      
      ::-webkit-scrollbar { display: none; }
      body { -ms-overflow-style: none; scrollbar-width: none; }
    </style>

</head>

</body>
